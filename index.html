<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="public/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="public/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="public/apple-touch-icon.png"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div>
      <header
        class="bg-gray-800 mb-4 p-4 2xl:px-[10%] flex flex-row justify-between"
      >
        <a href="https://ledgerbugsolutions.ca">
          <img
            class="max-w-[200px] sm:max-w-[420px] md:max-w-[500px] lg:max-w-[600px] h-auto object-contain"
            src="public/logo.png"
          />
        </a>
        <a
          href="mailto:allison@ledgerbugsolutions.ca"
          target="_blank"
          class="text-[#8dc424] hidden md:block text-md lg:text-lg font-bold"
          >allison@ledgerbugsolutions.ca</a
        >
        <a
          href="mailto:allison@ledgerbugsolutions.ca"
          target="_blank"
          class="text-[#8dc424] text-sm sm:text-md md:hidden flex items-center gap-1 font-bold"
          >Contact
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-mail-icon lucide-mail"
          >
            <path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7" />
            <rect x="2" y="4" width="20" height="16" rx="2" />
          </svg>
        </a>
      </header>

      <div class="my-8 mx-auto sm:max-w-[80%] max-w-[60%] lg:max-w-[650px]">
        <div class="text-4xl font-bold mb-4 text-[#036a37]">About Us</div>
        <p id="business-description" class="mb-8 text-lg">Loading...</p>

        <div class="text-4xl font-bold mb-4 text-[#036a37]">
          Services Provided
        </div>
        <ul id="services-list" class="text-lg">
          Loading...
        </ul>
      </div>
    </div>
    <div class="bg-gray-800 p-8">
      <div class="mx-auto max-w-[100%] sm:max-w-[60%] text-center">
        <div class="font-bold text-[#036a37] text-4xl">Contact Us Today!</div>
        <a
          href="mailto:allison@ledgerbugsolutions.ca"
          target="_blank"
          class="text-[#8dc424] text-lg font-bold"
          >allison@ledgerbugsolutions.ca</a
        >
      </div>
    </div>
    <script src="public/static/js/index.js" defer></script>
  </body>
</html>
